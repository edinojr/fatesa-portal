    <h1>TEOLOGIA DO OBREIRO</h1>
<h2>LIÇÃO 10</h2>
<h3>DIVERSOS OUTROS TIPOS DE OBREIROS</h3>
<p>**---</p>
<p>**</p>
    <div class="popup-overlay" id="overlay" onclick="closePopup()"></div>
    <div class="popup-window" id="popup">
        <div id="popup-content"></div>
        <button onclick="closePopup()">Fechar</button>
    </div>
    <script>
        async function showBiblicalPopup(element) {
            const ref = element.innerText;
            const contentDiv = document.getElementById("popup-content");
            const overlay = document.getElementById("overlay");
            const popup = document.getElementById("popup");
            contentDiv.innerText = "Carregando...";
            overlay.style.display = "block";
            popup.style.display = "block";
            try {
                const response = await fetch(`https://bible-api.com/${encodeURIComponent(ref)}?translation=almeida`);
                const data = await response.json();
                contentDiv.innerText = data.text || "Versículo não encontrado.";
            } catch (error) {
                contentDiv.innerText = "Erro ao carregar o versículo.";
            }
        }

        function showPopup(content) {
            document.getElementById('popup-content').innerText = content;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('popup').style.display = 'block';
        }
        function closePopup() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none';
        }
    </script>
